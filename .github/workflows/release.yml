name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Build artifact (frontend bundle + single-file)
        run: make build

      - name: Create release and attach the single-file artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            dist/repo-intel \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
          echo "sha256 (for the Homebrew formula):"
          shasum -a 256 dist/repo-intel

      - name: Update the floating major tag (e.g. v1)
        if: ${{ !contains(github.ref_name, '-') }} # skip prereleases like v1.0.0-rc1
        run: |
          set -euo pipefail
          major="${GITHUB_REF_NAME%%.*}" # v1.2.3 -> v1
          git tag -f "$major"
          git push -f origin "refs/tags/${major}"

      - name: Bump Homebrew tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sha="$(shasum -a 256 dist/repo-intel | awk '{print $1}')"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/repo-intel"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/tyom/homebrew-tap.git" tap
          cd tap
          f=Formula/repo-intel.rb
          sed -i -E "s|^  url \".*\"|  url \"${url}\"|"               "$f"
          sed -i -E "s|^  version \".*\"|  version \"${version}\"|"   "$f"
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${sha}\"|"         "$f"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "repo-intel ${version}"
          git push
