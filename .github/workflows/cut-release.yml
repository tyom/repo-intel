name: Cut release

# One-button release: validate main, build + smoke-test the exact commit, and
# only then create and push the tag. The tag is pushed with the default
# GITHUB_TOKEN, which by design does NOT re-trigger release.yml's `push: tags`
# path — so we call release.yml explicitly via workflow_call instead (no double
# release, no extra PAT to manage).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 1.2.3 or 1.2.3-rc1 (no leading v)"
        type: string
        required: true

permissions:
  contents: write # push the new tag

jobs:
  gate-and-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # always release from main HEAD
          fetch-depth: 0 # repo-intel reads full git history in the smoke test

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Validate version and compute tag
        id: tag
        run: |
          set -euo pipefail
          v="${{ inputs.version }}"
          v="${v#v}" # tolerate a leading v in the input
          if ! printf '%s' "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "::error::'$v' is not a valid semver (expected MAJOR.MINOR.PATCH[-prerelease])."
            exit 1
          fi
          tag="v${v}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists on origin."
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # The same gates CI runs on every PR — re-run them here against the exact
      # commit we're about to tag, so a tag is never created for a red build.
      - name: Check formatting (Prettier)
        run: make format-check

      - name: Type-check frontend
        run: make web-check

      - name: Build artifact (frontend bundle + single-file)
        run: make build

      - name: Verify the committed artifact matches a fresh build
        run: |
          git diff --exit-code -- dist/repo-intel || {
            echo "::error::dist/repo-intel is stale on main — run 'make build' and commit it before releasing."
            exit 1
          }

      - name: Smoke test — generate a dashboard against this repo
        run: |
          set -euo pipefail
          python3 dist/repo-intel 10 --no-open -o /tmp/index.html
          test -s /tmp/index.html
          grep -q "window.__DATA__" /tmp/index.html

      - name: Create and push the tag
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "repo-intel ${tag}"
          git push origin "$tag"

  release:
    needs: gate-and-tag
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.gate-and-tag.outputs.tag }}
    secrets: inherit # forwards HOMEBREW_TAP_TOKEN to the reusable workflow
