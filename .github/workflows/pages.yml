name: Pages (self-demo)

# Dogfoods the action: builds repo-intel's own dashboard and publishes it
# to this repo's GitHub Pages. Doubles as a live example of examples/pages.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./
        with:
          output: public
      - name: Publish the curl installer alongside the dashboard
        run: cp install.sh public/install.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
